name: Tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile key modules
        run: |
          python -m py_compile \
            src/rss_fetcher.py \
            src/wp_client.py \
            src/draft_audit.py \
            src/x_api_client.py \
            src/server.py

      - name: Run unit tests with coverage
        run: coverage run --source=src -m unittest discover -s tests

      - name: Show focused coverage report
        run: |
          coverage report -m \
            src/rss_fetcher.py \
            src/wp_client.py \
            src/server.py \
            src/x_post_generator.py

      - name: Warn on low rss_fetcher coverage
        run: |
          coverage json -o /tmp/yoshilover-coverage.json
          python - <<'PY'
          import json

          threshold = 55.0
          with open("/tmp/yoshilover-coverage.json", encoding="utf-8") as f:
              data = json.load(f)

          coverage = data["files"]["src/rss_fetcher.py"]["summary"]["percent_covered"]
          print(f"rss_fetcher.py coverage: {coverage:.1f}% (warning threshold: {threshold:.1f}%)")
          if coverage < threshold:
              print(
                  f"::warning file=src/rss_fetcher.py::"
                  f"rss_fetcher.py coverage {coverage:.1f}% is below {threshold:.1f}%"
              )
          PY
