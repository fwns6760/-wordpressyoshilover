name: Tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile key modules
        run: |
          python -m py_compile \
            src/rss_fetcher.py \
            src/wp_client.py \
            src/draft_audit.py \
            src/x_api_client.py \
            src/server.py

      - name: Run unit tests with coverage
        run: coverage run --source=src -m unittest discover -s tests

      - name: Show focused coverage report
        run: |
          coverage report -m \
            src/rss_fetcher.py \
            src/wp_client.py \
            src/server.py \
            src/x_post_generator.py
