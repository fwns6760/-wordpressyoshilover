name: Tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile key modules
        run: |
          python -m py_compile \
            src/rss_fetcher.py \
            src/wp_client.py \
            src/draft_audit.py \
            src/x_api_client.py \
            src/server.py

      - name: Run unit tests
        run: python -m unittest discover -s tests
