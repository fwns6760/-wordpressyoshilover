substitutions:
  _REGION: asia-northeast1
  _PROJECT_ID: baseballsite
  _IMAGE_NAME: draft-body-editor
  _TAG: latest

steps:
  - id: build draft-body-editor image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.draft_body_editor
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/yoshilover/${_IMAGE_NAME}:${_TAG}
      - .

  - id: push draft-body-editor image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/yoshilover/${_IMAGE_NAME}:${_TAG}

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/yoshilover/${_IMAGE_NAME}:${_TAG}

timeout: 600s

options:
  machineType: E2_MEDIUM
