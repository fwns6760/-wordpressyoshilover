# YOSHILOVER OPS_BOARD
# Machine-readable current ticket state.
# If this file conflicts with old handoffs/session logs, this file wins.

last_updated: "2026-05-01 JST"
updated_by: "Claude"

board_rules:
  active_limit: 2
  user_is_execution_owner: false
  raw_codex_to_user: false
  session_logs_are_history_only: true
  decision_batch_required: true
  production_change_policy:
    claude_auto_go:
      - "flag OFF deploy"
      - "live-inert deploy"
      - "behavior-preserving image replacement"
      - "tests green"
      - "rollback target confirmed"
      - "Gemini/mail/source/Scheduler/SEO/publish criteria/candidate risk unchanged"
    user_decision_required:
      - "flag ON"
      - "behavior-changing env"
      - "Gemini call increase"
      - "mail volume increase"
      - "source addition"
      - "Scheduler/SEO change"
      - "publish/review/hold/skip criteria change"
      - "cleanup mutation"
      - "rollback-impossible or external-impact-heavy change"
    hold_if_unknown:
      - "tests"
      - "rollback"
      - "cost/Gemini delta/mail volume"
      - "candidate disappearance risk"
      - "stop condition/blast radius/source impact/behavior invariance"

mail_storm_policy:
  all_mail_stop: forbidden
  scheduler_pause_as_normal_fallback: forbidden
  reapply_review_window_168h: forbidden
  wait_for_pool_exhaustion: forbidden
  unknown_mail_volume_go: forbidden
  mail_budget_violation: P1
  normal_review_mail: keep
  post_gen_validate_289_mail: keep
  error_mail: keep

